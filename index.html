<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #eee;
        }
        .container {
            background-color: #fff;
            margin: 48px auto;
            padding: 16px;
            border-radius: 12px;
            width: 350px;
            max-width: 95%;
            box-shadow: 0 0 12px rgba(0, 0, 0, .1);
        }
        .add {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }
        input {
            padding: 6px;
            width: 180px;
            flex-grow: 1;
        }
        button {
            padding: 6px;
            width: 80px;
            flex-grow: 1;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            border-bottom: solid 1px #ddd;
            margin-bottom: 8px;
            padding: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>To-do list</h2>
        <div class="add">
            <input type="text" id="input" placeholder="New task">
            <button id="button">Add</button>
        </div>
        
        <ul id="ul"></ul>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
        getFirestore,
        collection,
        addDoc,
        deleteDoc,
        doc,
        onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔥 PEGA AQUÍ TU CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBdsQWRj3ZFTiQETyhIUX9YBOZYYyTpq5s",
        authDomain: "to-do-list-7cf6c.firebaseapp.com",
        projectId: "to-do-list-7cf6c",
        storageBucket: "to-do-list-7cf6c.firebasestorage.app",
        messagingSenderId: "1015743308584",
        appId: "1:1015743308584:web:40de53747761e16eb6661d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const input = document.getElementById('input')
    const button = document.getElementById('button')
    const ul = document.getElementById('ul')

    let tasks = []

    // 🔄 ESCUCHA EN TIEMPO REAL
    onSnapshot(collection(db, "tasks"), (snapshot) => {
        tasks = []

        snapshot.forEach((docItem) => {
            tasks.push({
                id: docItem.id,
                texto: docItem.data().texto
            })
        })

        renderTasks()
    })

    function renderTasks() {
        ul.innerHTML = ""

        tasks.forEach((task) => {
            const li = document.createElement('li')
            li.textContent = task.texto

            const del = document.createElement('span')
            del.textContent = '❌'

            del.onclick = async () => {
                await deleteDoc(doc(db, "tasks", task.id))
            }

            li.appendChild(del)
            ul.appendChild(li)
        })
    }

    button.addEventListener('click', async () => {
        const texto = input.value.trim()

        if (texto) {
            await addDoc(collection(db, "tasks"), {
                texto: texto,
                createdAt: Date.now()
            })

            input.value = ''
        }
    })

    // service worker
    if('serviceWorker' in navigator){
        navigator.serviceWorker.register('sw.js')
            .then(()=>console.log("SW registrado"))
    }
</script>
</body>
</html>
